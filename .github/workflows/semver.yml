name: Check SemVer Tags

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  semver:
    name: Verify version tags & releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mint scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AETHERPAK_ACTION_BOT_CLIENT_ID }}
          private-key: ${{ secrets.AETHERPAK_ACTION_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-workflows: write
          permission-metadata: read

      - name: Verify & auto-fix SemVer tags
        uses: jessehouwing/actions-semver-checker@v2
        with:
          auto-fix: true
          check-marketplace: false
          token: ${{ steps.app-token.outputs.token }}
